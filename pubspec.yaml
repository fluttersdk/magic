name: magic
description: "A Laravel-inspired Flutter framework with Eloquent ORM, routing, and MVC architecture."
version: 1.0.0-alpha.9
homepage: https://magic.fluttersdk.com
repository: https://github.com/fluttersdk/magic
issue_tracker: https://github.com/fluttersdk/magic/issues

executables:
  magic: magic

topics:
  - framework
  - mvc
  - orm
  - laravel
  - architecture

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  fluttersdk_wind: ^1.0.0-alpha.4
  dio: ^5.9.0
  flutter_dotenv: ^6.0.0
  go_router: ^17.1.0
  intl: ^0.20.2
  jiffy: ^6.3.1
  path_provider: ^2.1.2
  path: ^1.9.0
  web: ^1.1.1
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  sqlite3: ^3.2.0
  sqlite3_flutter_libs: ^0.6.0+eol
  shared_preferences: ^2.3.2
  share_plus: ^12.0.1
  timezone: ^0.11.0
  url_launcher: ^6.3.0
  logger: ^2.6.2
  file_picker: ^10.3.10
  image_picker: ^1.1.2
  faker: ^2.2.0
  web_socket_channel: ^3.0.0
  magic_cli: ^0.0.1-alpha.6
  flutter_test:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
