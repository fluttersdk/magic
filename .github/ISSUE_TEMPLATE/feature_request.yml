name: Feature Request
description: Suggest a new feature or enhancement for Magic Framework
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Magic? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like to see?
      placeholder: A clear description of the feature and why it's needed.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which part of the framework does this relate to?
      options:
        - Foundation (IoC, Config, Env)
        - Auth
        - Database (Eloquent, Migrations)
        - HTTP (Controller, Middleware)
        - Network (Dio Client)
        - Routing
        - Cache
        - Events
        - Validation
        - Localization
        - Storage / Vault
        - UI (Views, Forms, Feedback)
        - New Module
        - Other
    validations:
      required: true

  - type: textarea
    id: api-syntax
    attributes:
      label: Proposed API
      description: How would the API look? Show the facade call, config, or usage pattern.
      placeholder: |
        // Queue facade example
        await Queue.dispatch(SendWelcomeEmail(user));
        await Queue.later(Duration(minutes: 5), ProcessPayment(order));
      render: dart

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a real scenario where you'd use this feature.
      placeholder: "When handling background tasks, I need a queue system to defer expensive operations..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: textarea
    id: code
    attributes:
      label: Example Implementation
      description: How would this look in a real app?
      render: dart
