name: Bug Report
description: Report a bug in Magic Framework
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Call `Magic.init(configFactories: [...])`
        2. Access `Auth.user` after boot
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which part of the framework is affected?
      options:
        - Foundation (IoC, Magic.init, Config)
        - Auth (Guards, Login/Logout)
        - Database (Eloquent, QueryBuilder, Migrations)
        - HTTP (Controller, Middleware, Kernel)
        - Network (Dio, MagicResponse)
        - Routing (MagicRouter, GoRouter)
        - Cache
        - Events
        - Validation
        - Localization
        - Storage / Vault
        - UI (MagicView, MagicForm, MagicFeedback)
        - Encryption
        - Other
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproduction Code
      description: A minimal code snippet to reproduce the issue.
      render: dart

  - type: input
    id: magic-version
    attributes:
      label: Magic Version
      placeholder: "1.0.0-alpha.1"
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      placeholder: "3.27.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - macOS
        - Windows
        - Linux
        - All
    validations:
      required: true
