<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- VARIANT B: "Orbit Rings" - Elliptical orbits spinning around chevrons -->

    <linearGradient id="m1-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="m1-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="m2-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="m2-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="m3-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="m3-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="m4-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="m4-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>

    <!-- Orbit stroke gradients -->
    <linearGradient id="orbit-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#DDD6FE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="orbit-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#C4B5FD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="orbit-3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DDD6FE" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- ORBIT RINGS: Behind chevrons (drawn first) -->

  <!-- Orbit 1 - wide horizontal ellipse, tilted slightly -->
  <g transform="rotate(-12, 265, 245)">
    <ellipse cx="265" cy="245" rx="248" ry="100" fill="none"
             stroke="url(#orbit-1)" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Orbit 2 - narrower, tilted opposite -->
  <g transform="rotate(25, 265, 245)">
    <ellipse cx="265" cy="245" rx="240" ry="75" fill="none"
             stroke="url(#orbit-2)" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Orbit 3 - steepest tilt -->
  <g transform="rotate(60, 265, 245)">
    <ellipse cx="265" cy="245" rx="230" ry="60" fill="none"
             stroke="url(#orbit-3)" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- 3D Chevrons (on top of orbits) -->
  <path d="M280 56 L456 232 L280 320 L368 232 L280 144 Z" fill="url(#m4-light)"/>
  <path d="M280 320 L456 232 L280 408 Z" fill="url(#m4-dark)"/>
  <path d="M216 88 L392 264 L216 352 L304 264 L216 176 Z" fill="url(#m3-light)"/>
  <path d="M216 352 L392 264 L216 440 Z" fill="url(#m3-dark)"/>
  <path d="M152 120 L328 296 L152 384 L240 296 L152 208 Z" fill="url(#m2-light)"/>
  <path d="M152 384 L328 296 L152 472 Z" fill="url(#m2-dark)"/>
  <path d="M88 40 L264 216 L88 304 L176 216 L88 128 Z" fill="url(#m1-light)"/>
  <path d="M88 304 L264 216 L88 392 Z" fill="url(#m1-dark)"/>
</svg>
